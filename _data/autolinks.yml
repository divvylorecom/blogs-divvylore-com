# ============================================================================
# Auto-hyperlink dictionary
# ----------------------------------------------------------------------------
# Every entry maps a word or phrase to a URL. When that term appears in the
# body of a post, the build automatically turns it into a hyperlink.
#
# Fields:
#   term            (required) The word/phrase to detect, e.g. "MoneyControl".
#   url             (required) Where the link should point.
#   title           (optional) Hover tooltip text for the link.
#   match           (optional) "word"  -> match whole words only (default)
#                              "phrase"-> allow matching inside longer text
#   case_sensitive  (optional) true/false. Default false (case-insensitive).
#   limit           (optional) Max links for this term in one article.
#                              Overrides the global autolink.limit_per_term.
#                              Use 0 for unlimited.
#
# Longer phrases are matched before shorter ones, so "Reserve Bank of India"
# wins over "India". Existing links, code blocks and headings are never
# touched.
# ============================================================================

- term: MoneyControl
  url: https://www.moneycontrol.com/
  title: MoneyControl — markets, news & data

- term: Reserve Bank of India
  url: https://www.rbi.org.in/
  title: Reserve Bank of India

- term: RBI
  url: https://www.rbi.org.in/
  title: Reserve Bank of India

- term: SEBI
